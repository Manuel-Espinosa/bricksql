services:
  backend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client
      - bricksql-dev-data:/data
    ports:
      - "${PORT_BACK:-3000}:3000"
    environment:
      BRICKSQL_USER: ${BRICKSQL_USER:-admin}
      BRICKSQL_PASSWORD: ${BRICKSQL_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      DATA_DIR: /data
      PORT: 3000
      NODE_ENV: development
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run start:dev"

  frontend:
    image: node:22-alpine
    working_dir: /app/client
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
    ports:
      - "${PORT_FRONT:-5173}:5173"
    environment:
      VITE_API_URL: http://backend:3000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  demo-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    volumes:
      - ./dev/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bricksql-dev-data:
