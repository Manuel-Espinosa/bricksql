services:
  bricksql:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - bricksql-data:/data
    environment:
      BRICKSQL_USER: ${BRICKSQL_USER:?BRICKSQL_USER is required}
      BRICKSQL_PASSWORD: ${BRICKSQL_PASSWORD:?BRICKSQL_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATA_DIR: /data
      PORT: 3000
      NODE_ENV: production
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  bricksql-data:
